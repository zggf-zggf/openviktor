services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openviktor
      POSTGRES_USER: openviktor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openviktor_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openviktor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: ..
      dockerfile: apps/bot/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://openviktor:${POSTGRES_PASSWORD:-openviktor_dev}@postgres:5432/openviktor
      REDIS_URL: redis://redis:6379
    volumes:
      - workspace_data:/data/workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  bot-dev:
    build:
      context: ..
      dockerfile: apps/bot/Dockerfile
      target: dev
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://openviktor:${POSTGRES_PASSWORD:-openviktor_dev}@postgres:5432/openviktor
      REDIS_URL: redis://redis:6379
    volumes:
      - ..:/app:z
      - bot_dev_modules:/app/node_modules
      - workspace_data:/data/workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - dev

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://openviktor:${POSTGRES_PASSWORD:-openviktor_dev}@postgres:5432/openviktor
    ports:
      - "${WEB_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  workspace_data:
  bot_dev_modules:
